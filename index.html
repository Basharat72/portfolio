  <!-- Restore saved theme + language before first paint (prevents flash) -->
  <script>
    (function () {
      var root = document.documentElement;
      var theme = localStorage.getItem("theme");
      if (theme === "light" || theme === "dark") root.setAttribute("data-theme", theme);
      // German is the default language; a stored choice wins
      var lang = localStorage.getItem("lang") === "en" ? "en" : "de";
      root.setAttribute("lang", lang);
    })();
  </script>
